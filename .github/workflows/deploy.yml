name: Deploy Yield Curve Monitor to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TIMESTAMP: temp_${{ github.run_id }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH key
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        HOST: ${{ secrets.HOSTINGER_HOST }}
      run: |
        set -e
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        # Write key exactly — avoids appleboy passphrase / formatting issues
        printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
        # Verify key parses and authenticates before rsync
        ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes \
          ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} 'echo SSH OK'

    - name: Create temp directory on VPS
      run: |
        ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
          ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} << EOF
        DEPLOY_PATH="/var/www/yield-curve"
        TEMP_PATH="\${DEPLOY_PATH}_${{ env.DEPLOY_TIMESTAMP }}"
        echo "Starting Yield Curve deployment with ID ${{ env.DEPLOY_TIMESTAMP }}"
        mkdir -p "\$TEMP_PATH"
        EOF

    - name: Sync files
      run: |
        rsync -avz --delete \
          --exclude='.git' --exclude='node_modules' --exclude='.next' \
          --exclude='backend/venv' --exclude='backend/.pytest_cache' \
          --exclude='backend/app/data/*.sqlite' \
          --exclude='.env' --exclude='.env.local' --exclude='.env.production' \
          -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
          ./ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:/var/www/yield-curve_${{ env.DEPLOY_TIMESTAMP }}/

    - name: Finalize deployment
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_PORT: ${{ secrets.DB_PORT }}
        DB_NAME: ${{ secrets.DB_NAME }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
      run: |
        ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
          ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
          "FRED_API_KEY='$FRED_API_KEY' DB_HOST='$DB_HOST' DB_PORT='$DB_PORT' DB_NAME='$DB_NAME' DB_USER='$DB_USER' DB_PASSWORD='$DB_PASSWORD' GITHUB_RUN_ID='$GITHUB_RUN_ID' GITHUB_RUN_ATTEMPT='$GITHUB_RUN_ATTEMPT' DEPLOY_TIMESTAMP='${{ env.DEPLOY_TIMESTAMP }}' bash -s" << 'REMOTE'
        set -e

        DEPLOY_PATH="/var/www/yield-curve"
        RELEASES_PATH="/var/www/releases"
        NEW_RELEASE_PATH="${RELEASES_PATH}/yield-curve_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
        KEEP_RELEASES=3
        FRONTEND_PORT=3059
        BACKEND_PORT=8059

        rollback() {
          echo "[YIELD CURVE ROLLBACK] Deployment failed."
          FAILED=$1
          PREVIOUS=$2
          if [ -n "$PREVIOUS" ] && [ -L "$DEPLOY_PATH" ] && [ -d "$PREVIOUS" ]; then
            if [ "$(readlink $DEPLOY_PATH)" == "$FAILED" ]; then
              ln -sfn "$PREVIOUS" "$DEPLOY_PATH"
              pm2 restart yield-curve yield-curve-api || true
              pm2 save --force || true
            fi
          fi
          [ -d "$FAILED" ] && rm -rf "$FAILED"
          exit 1
        }

        TEMP_PATH="/var/www/yield-curve_${DEPLOY_TIMESTAMP}"
        if [ ! -d "$TEMP_PATH" ]; then echo "ERROR: temp path missing"; exit 1; fi
        mkdir -p "$RELEASES_PATH"
        [ -e "$NEW_RELEASE_PATH" ] && rm -rf "$NEW_RELEASE_PATH"
        mv "$TEMP_PATH" "$NEW_RELEASE_PATH"

        PREVIOUS=$(readlink $DEPLOY_PATH || echo "")

        # Carry forward SQLite cache from previous release for migration
        if [ -n "$PREVIOUS" ] && [ -f "$PREVIOUS/backend/app/data/yield_curve_cache.sqlite" ]; then
          mkdir -p "$NEW_RELEASE_PATH/backend/app/data"
          cp "$PREVIOUS/backend/app/data/yield_curve_cache.sqlite" \
            "$NEW_RELEASE_PATH/backend/app/data/yield_curve_cache.sqlite"
        fi

        cat > "$NEW_RELEASE_PATH/.env.production" << EOF
        FRED_API_KEY='${FRED_API_KEY}'
        BACKEND_URL=http://127.0.0.1:${BACKEND_PORT}
        SQLITE_CACHE_PATH=${NEW_RELEASE_PATH}/backend/app/data/yield_curve_cache.sqlite
        CURVE_CACHE_MAX_AGE_HOURS=18
        NEXT_TELEMETRY_DISABLED=1
        NODE_ENV=production
        PORT=${FRONTEND_PORT}
        NEXT_PUBLIC_SITE_URL=https://yield.252.capital
        EOF

        cat > "$NEW_RELEASE_PATH/backend/.env" << EOF
        FRED_API_KEY='${FRED_API_KEY}'
        CURVE_STORE_BACKEND=postgres
        DB_HOST='${DB_HOST}'
        DB_PORT='${DB_PORT}'
        DB_NAME='${DB_NAME}'
        DB_USER='${DB_USER}'
        DB_PASSWORD='${DB_PASSWORD}'
        SQLITE_CACHE_PATH=${NEW_RELEASE_PATH}/backend/app/data/yield_curve_cache.sqlite
        CURVE_CACHE_MAX_AGE_HOURS=18
        HOST=0.0.0.0
        PORT=${BACKEND_PORT}
        EOF

        cp "$NEW_RELEASE_PATH/backend/.env" "$NEW_RELEASE_PATH/.env"
        mkdir -p "$NEW_RELEASE_PATH/backend/app/data"

        cd "$NEW_RELEASE_PATH"
        export PATH="$HOME/.npm-global/bin:$PATH"
        if ! command -v pnpm >/dev/null 2>&1; then
          npm install -g pnpm@latest --prefix "$HOME/.npm-global"
        fi
        rm -rf node_modules .next
        set +e
        pnpm install --frozen-lockfile
        INSTALL_RC=$?
        set -e
        if [ "$INSTALL_RC" -ne 0 ] && [ ! -d node_modules/.pnpm ]; then
          rollback "$NEW_RELEASE_PATH" "$PREVIOUS"
        fi
        pnpm rebuild sharp 2>/dev/null || true
        if ! pnpm run build; then
          rollback "$NEW_RELEASE_PATH" "$PREVIOUS"
        fi

        mkdir -p "$NEW_RELEASE_PATH/.next/standalone/.next"
        cp -r "$NEW_RELEASE_PATH/public" "$NEW_RELEASE_PATH/.next/standalone/"
        cp -r "$NEW_RELEASE_PATH/.next/static" "$NEW_RELEASE_PATH/.next/standalone/.next/"

        cd "$NEW_RELEASE_PATH/backend"
        python3 -m venv venv
        source venv/bin/activate
        pip install -q -r requirements.txt

        ln -sfn "$NEW_RELEASE_PATH" "$DEPLOY_PATH"

        cd "$DEPLOY_PATH/backend"
        python -c "from app.core.curve_store import get_curve_store; s=get_curve_store(); s._ensure_db() if hasattr(s,'_ensure_db') else None"
        python scripts/migrate_sqlite_to_pg.py || echo "WARN: SQLite migration skipped"
        python scripts/cron/fred_daily.py || echo "WARN: FRED backfill skipped"
        deactivate

        pm2 delete yield-curve-api 2>/dev/null || true
        cd "$DEPLOY_PATH/backend"
        pm2 start venv/bin/python --name yield-curve-api \
          --cwd "$DEPLOY_PATH/backend" \
          -- -m uvicorn app.main:app --host 0.0.0.0 --port ${BACKEND_PORT}

        pm2 delete yield-curve 2>/dev/null || true
        PORT=${FRONTEND_PORT} pm2 start node --name yield-curve \
          --cwd "$DEPLOY_PATH/.next/standalone" -- server.js

        sleep 12

        if ! curl --fail --silent --max-time 10 http://127.0.0.1:${BACKEND_PORT}/health > /dev/null; then
          echo "Backend health check failed"
          rollback "$NEW_RELEASE_PATH" "$PREVIOUS"
        fi
        if ! curl --fail --silent --max-time 10 --head http://127.0.0.1:${FRONTEND_PORT} > /dev/null; then
          echo "Frontend health check failed"
          rollback "$NEW_RELEASE_PATH" "$PREVIOUS"
        fi

        pm2 save --force

        cd "$RELEASES_PATH"
        ls -1td yield-curve_* 2>/dev/null | tail -n +$(($KEEP_RELEASES + 1)) | while read OLD; do
          [ "$OLD" != "$(basename $(readlink -f $DEPLOY_PATH))" ] && rm -rf "$OLD"
        done

        echo "✓ Yield Curve Monitor deployed"
        echo "  Frontend: http://127.0.0.1:${FRONTEND_PORT}"
        echo "  Backend:  http://127.0.0.1:${BACKEND_PORT}/health"
        echo "  Public:   https://yield.252.capital"
        REMOTE
