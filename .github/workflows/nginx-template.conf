# Yield Curve Monitor — Nginx template
# Subdomain: yield.252.capital  |  Port: 3053
# Copy to /etc/nginx/sites-available/yield-curve.conf and enable.

server {
    listen 80;
    listen [::]:80;
    server_name yield.252.capital;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yield.252.capital;

    ssl_certificate /etc/letsencrypt/live/252.capital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/252.capital/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/yield-curve-access.log combined;
    error_log /var/log/nginx/yield-curve-error.log warn;

    location / {
        proxy_pass http://127.0.0.1:3053;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3053;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        add_header Cache-Control "no-store";
    }
}
