# Step 1: Use this HTTP-only config FIRST (before SSL is issued for yield.252.capital)
# Copy to VPS: /etc/nginx/sites-available/yield-curve.conf
# After certbot, replace with nginx-template.conf (or let certbot upgrade this file)

server {
    listen 80;
    listen [::]:80;
    server_name yield.252.capital;

    access_log /var/log/nginx/yield-curve-access.log combined;
    error_log /var/log/nginx/yield-curve-error.log warn;

    location / {
        proxy_pass http://127.0.0.1:3054;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3054;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
