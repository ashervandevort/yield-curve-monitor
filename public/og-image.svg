<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1318"/>
      <stop offset="100%" stop-color="#07090c"/>
    </linearGradient>
    <linearGradient id="curve" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="50%" stop-color="#ff9900"/>
      <stop offset="100%" stop-color="#00cccc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="630" fill="#ff6600" opacity="0.04"/>

  <!-- stylized yield curve -->
  <polyline
    fill="none"
    stroke="url(#curve)"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
    points="120,420 280,380 440,340 600,300 760,270 920,250 1080,230"
  />
  <circle cx="120" cy="420" r="6" fill="#ff6600"/>
  <circle cx="600" cy="300" r="6" fill="#ff9900"/>
  <circle cx="1080" cy="230" r="6" fill="#00cccc"/>

  <!-- grid -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
    <line x1="100" y1="180" x2="1100" y2="180"/>
    <line x1="100" y1="280" x2="1100" y2="280"/>
    <line x1="100" y1="380" x2="1100" y2="380"/>
    <line x1="100" y1="480" x2="1100" y2="480"/>
  </g>

  <text x="600" y="120" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="600" text-anchor="middle" fill="#f8fafc">
    Yield <tspan fill="#ff6600">Curve</tspan> Monitor
  </text>
  <text x="600" y="175" font-family="Inter, system-ui, sans-serif" font-size="28" text-anchor="middle" fill="#94a3b8">
    Treasury rates · spreads · DV01 hedge optimizer
  </text>

  <g font-family="JetBrains Mono, monospace" font-size="18" fill="#64748b">
    <text x="600" y="540" text-anchor="middle">FRED-backed · ZT ZF ZN TN ZB UB</text>
    <text x="600" y="580" text-anchor="middle">yield.252.capital</text>
  </g>
</svg>
